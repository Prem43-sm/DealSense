services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://dealsense:dealsense@postgres:5432/dealsense
      REDIS_URL: redis://redis:6379/0
      ENABLE_SCHEDULER: "true"
      BACKEND_CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: >
      sh -c "alembic upgrade head &&
             python scripts/seed.py &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dealsense
      POSTGRES_USER: dealsense
      POSTGRES_PASSWORD: dealsense
    ports:
      - "5432:5432"
    volumes:
      - dealsense_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dealsense -d dealsense"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - dealsense_redis:/data

volumes:
  dealsense_postgres:
  dealsense_redis:
